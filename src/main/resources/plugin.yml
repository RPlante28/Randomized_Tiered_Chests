name: RandomizeChests
version: 1.0.0
main: com.randomizechests.RandomizeChests
api-version: "1.21"
description: Randomizes HungerGames arena chest tiers by distance from cornucopia center
author: Plante
softdepend:
  - HungerGames
  - WorldEdit
commands:
  tierchests:
    description: Randomize chest tiers for a HungerGames arena
    usage: /tierchests <arenaName>
    permission: randomizechests.admin
permissions:
  randomizechests.admin:
    description: Access to /tierchests command
    default: op
